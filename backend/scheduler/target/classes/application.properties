spring.application.name=AlertWIP
# Dynamiczna pula
app.executor.core-size=5
app.executor.max-size=50
app.executor.queue-capacity=100
server.port=10000

# Sciezka do skrypt�w
app.scripts.path=scripts/

# Dane polaczenia
spring.datasource.url=jdbc:mysql://localhost:3306/alertdb
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Wy??cza kompresj?, kt�ra cz?sto powoduje buforowanie SSE
server.compression.enabled=false

# Je?li u?ywasz nowszego Spring Boota, wymu? natychmiastowe wysy?anie
spring.mvc.async.request-timeout=-1