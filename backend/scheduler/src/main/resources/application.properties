spring.application.name=AlertWIP
# Dynamiczna pula
app.executor.core-size=5
app.executor.max-size=50
app.executor.queue-capacity=100
server.port=10000

# Sciezka do skryptów
app.scripts.path=scripts/

# Dane polaczenia
spring.datasource.url=jdbc:mysql://localhost:3306/alertdb
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Wylacza kompresje
server.compression.enabled=false
spring.mvc.async.request-timeout=-1

# Wygenerowany 256-bit klucz NIE MOZE TRAFIC NA PROD
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000 
# 24h w milisekundach